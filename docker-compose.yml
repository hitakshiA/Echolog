services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app:create_app
      - DATABASE_URL=sqlite:///echolog.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-key-here}
      - ECHOLOG_LLM_PROVIDER=${ECHOLOG_LLM_PROVIDER:-openai}
      - SECRET_KEY=docker-dev-secret
    volumes:
      - ./backend:/app
      - backend-data:/app/instance

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:5000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  backend-data:
